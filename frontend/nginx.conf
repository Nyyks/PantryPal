server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Increase timeouts for recipe import (external HTTP call)
    proxy_connect_timeout 30s;
    proxy_read_timeout    120s;
    proxy_send_timeout    30s;

    # PWA: service worker must not be cached by the browser
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # API proxy to backend
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Return JSON errors instead of HTML when backend is down
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_down;
    }

    location @backend_down {
        default_type application/json;
        return 503 '{"error":"Backend service is starting up or unavailable. Please wait a moment and try again."}';
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
